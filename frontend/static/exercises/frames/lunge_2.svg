<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 110">
  <!-- stepping forward into right lunge -->
  <ellipse cx="42" cy="108" rx="22" ry="3" fill="rgba(0,0,0,.15)"/>
  <!-- right leg (stepping forward) -->
  <path d="M45,65 Q50,74 54,82" stroke="#162d4a" stroke-width="11" stroke-linecap="round" fill="none"/>
  <circle cx="54" cy="81" r="5" fill="#162d4a"/>
  <path d="M54,81 Q56,93 57,104" stroke="#1a2d42" stroke-width="10" stroke-linecap="round" fill="none"/>
  <path d="M50,104 Q57,108 65,108 Q67,107 67,104 Q66,101 62,100 L56,100Z" fill="#ddd"/>
  <!-- shorts (wider stance) -->
  <path d="M24,62 Q40,69 56,63 L53,78 Q40,82 27,78Z" fill="#1e3a5f"/>
  <path d="M24,62 L26,80 L36,80 L38,62Z" fill="#1a3158"/>
  <path d="M42,63 L44,78 L54,78 L56,63Z" fill="#1a3158"/>
  <!-- shirt (slight forward lean) -->
  <path d="M21,29 Q40,25 58,29 L56,64 Q40,69 23,64Z" fill="#3b82f6"/>
  <path d="M21,29 Q40,26 58,29 L56,43 Q40,45 23,43Z" fill="rgba(255,255,255,.08)"/>
  <!-- right arm (back, for balance) -->
  <path d="M57,33 Q63,45 65,56" stroke="#e0b070" stroke-width="8" stroke-linecap="round" fill="none"/>
  <circle cx="65" cy="55" r="4" fill="#d8a868"/>
  <path d="M65,55 Q66,64 66,72" stroke="#e0b070" stroke-width="7" stroke-linecap="round" fill="none"/>
  <circle cx="66" cy="73" r="3.5" fill="#e0b070"/>
  <!-- left leg (back, weight shifting) -->
  <path d="M35,65 Q28,76 25,87" stroke="#1e3a5f" stroke-width="11" stroke-linecap="round" fill="none"/>
  <circle cx="25" cy="86" r="5" fill="#243352"/>
  <path d="M25,86 Q23,96 22,104" stroke="#243352" stroke-width="10" stroke-linecap="round" fill="none"/>
  <path d="M14,104 Q22,108 30,108 Q32,107 32,104 Q31,101 27,100 L21,100Z" fill="#e8e8e8"/>
  <!-- neck -->
  <rect x="36" y="25" width="8" height="6" rx="2" fill="#f5c49a"/>
  <!-- head -->
  <circle cx="40" cy="14" r="11" fill="#f5c49a"/>
  <path d="M29,11 Q40,3 51,11 Q50,6 40,4 Q30,6 29,11Z" fill="#2c1b10"/>
  <ellipse cx="36" cy="13" rx="1.8" ry="2.2" fill="#1a0a00"/>
  <ellipse cx="44" cy="13" rx="1.8" ry="2.2" fill="#1a0a00"/>
  <ellipse cx="36.8" cy="12" rx=".6" ry=".8" fill="rgba(255,255,255,.65)"/>
  <ellipse cx="44.8" cy="12" rx=".6" ry=".8" fill="rgba(255,255,255,.65)"/>
  <path d="M37.5,18 Q40,20 42.5,18" stroke="#c07050" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- left arm (forward, for balance) -->
  <path d="M23,33 Q18,43 16,53" stroke="#f5c49a" stroke-width="8" stroke-linecap="round" fill="none"/>
  <circle cx="16" cy="52" r="4" fill="#f0b888"/>
  <path d="M16,52 Q15,62 15,70" stroke="#f5c49a" stroke-width="7" stroke-linecap="round" fill="none"/>
  <circle cx="15" cy="71" r="3.5" fill="#f5c49a"/>
</svg>
