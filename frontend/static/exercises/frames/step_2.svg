<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 110">
  <!-- stepping left – right leg pushing, left leg extending left -->
  <ellipse cx="36" cy="108" rx="22" ry="3" fill="rgba(0,0,0,.15)"/>
  <!-- right leg (pushing off – bearing weight) -->
  <path d="M52,68 Q56,78 58,90" stroke="#162d4a" stroke-width="11" stroke-linecap="round" fill="none"/>
  <circle cx="58" cy="89" r="5" fill="#162d4a"/>
  <path d="M58,89 Q58,97 58,105" stroke="#1a2d42" stroke-width="10" stroke-linecap="round" fill="none"/>
  <path d="M51,105 Q58,109 66,109 Q68,108 68,105 Q67,102 63,101 L57,101Z" fill="#ddd"/>
  <!-- shorts (angled left) -->
  <path d="M21,66 Q38,73 55,67 L52,81 Q37,85 23,82Z" fill="#1e3a5f"/>
  <path d="M21,66 L22,84 L31,84 L33,66Z" fill="#1a3158"/>
  <path d="M41,67 L43,81 L52,81 L55,67Z" fill="#1a3158"/>
  <!-- shirt (leaning left) -->
  <path d="M19,30 Q38,26 57,31 L54,67 Q38,72 21,67Z" fill="#6366f1"/>
  <path d="M19,30 Q38,27 57,31 L54,44 Q38,46 21,44Z" fill="rgba(255,255,255,.08)"/>
  <!-- right arm (swinging out to right for balance) -->
  <path d="M56,34 Q63,44 67,53" stroke="#e0b070" stroke-width="8" stroke-linecap="round" fill="none"/>
  <circle cx="67" cy="52" r="4" fill="#d8a868"/>
  <path d="M67,52 Q70,60 71,67" stroke="#e0b070" stroke-width="7" stroke-linecap="round" fill="none"/>
  <circle cx="71" cy="68" r="3.5" fill="#e0b070"/>
  <!-- left leg (stepping wide left) -->
  <path d="M28,68 Q18,79 12,91" stroke="#1e3a5f" stroke-width="11" stroke-linecap="round" fill="none"/>
  <circle cx="12" cy="90" r="5" fill="#243352"/>
  <path d="M12,90 Q11,98 11,105" stroke="#243352" stroke-width="10" stroke-linecap="round" fill="none"/>
  <path d="M3,105 Q11,109 19,109 Q21,108 21,105 Q20,102 16,101 L10,101Z" fill="#e8e8e8"/>
  <!-- neck -->
  <rect x="35" y="27" width="8" height="6" rx="2" fill="#f5c49a"/>
  <!-- head (looking left) -->
  <circle cx="39" cy="16" r="11" fill="#f5c49a"/>
  <path d="M28,13 Q39,5 50,13 Q49,8 39,6 Q29,8 28,13Z" fill="#2c1b10"/>
  <ellipse cx="35" cy="15" rx="1.8" ry="2.2" fill="#1a0a00"/>
  <ellipse cx="43" cy="15" rx="1.8" ry="2.2" fill="#1a0a00"/>
  <ellipse cx="35.8" cy="14" rx=".6" ry=".8" fill="rgba(255,255,255,.65)"/>
  <ellipse cx="43.8" cy="14" rx=".6" ry=".8" fill="rgba(255,255,255,.65)"/>
  <path d="M36,20 Q39,22 42,20" stroke="#c07050" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- left arm (swinging left for momentum) -->
  <path d="M21,34 Q12,43 7,52" stroke="#f5c49a" stroke-width="8" stroke-linecap="round" fill="none"/>
  <circle cx="8" cy="51" r="4" fill="#f0b888"/>
  <path d="M8,51 Q5,59 4,67" stroke="#f5c49a" stroke-width="7" stroke-linecap="round" fill="none"/>
  <circle cx="4" cy="68" r="3.5" fill="#f5c49a"/>
</svg>
