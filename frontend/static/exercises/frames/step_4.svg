<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 110">
  <!-- stepping right – left leg pushing, right leg extending right -->
  <ellipse cx="44" cy="108" rx="22" ry="3" fill="rgba(0,0,0,.15)"/>
  <!-- left leg (pushing off) -->
  <path d="M28,68 Q24,78 22,90" stroke="#1e3a5f" stroke-width="11" stroke-linecap="round" fill="none"/>
  <circle cx="22" cy="89" r="5" fill="#243352"/>
  <path d="M22,89 Q22,97 22,105" stroke="#243352" stroke-width="10" stroke-linecap="round" fill="none"/>
  <path d="M14,105 Q22,109 30,109 Q32,108 32,105 Q31,102 27,101 L21,101Z" fill="#e8e8e8"/>
  <!-- shorts (angled right) -->
  <path d="M25,66 Q42,73 59,67 L56,81 Q41,85 27,82Z" fill="#1e3a5f"/>
  <path d="M25,66 L27,84 L36,84 L38,66Z" fill="#1a3158"/>
  <path d="M45,67 L47,81 L56,81 L59,67Z" fill="#1a3158"/>
  <!-- shirt (leaning right) -->
  <path d="M23,30 Q42,26 61,31 L58,67 Q42,72 25,67Z" fill="#6366f1"/>
  <path d="M23,30 Q42,27 61,31 L58,44 Q42,46 25,44Z" fill="rgba(255,255,255,.08)"/>
  <!-- right leg (stepping wide right) -->
  <path d="M52,68 Q62,79 68,91" stroke="#162d4a" stroke-width="11" stroke-linecap="round" fill="none"/>
  <circle cx="68" cy="90" r="5" fill="#162d4a"/>
  <path d="M68,90 Q69,98 69,105" stroke="#1a2d42" stroke-width="10" stroke-linecap="round" fill="none"/>
  <path d="M61,105 Q69,109 77,109 Q79,108 79,105 Q78,102 74,101 L68,101Z" fill="#ddd"/>
  <!-- left arm (swinging left for balance) -->
  <path d="M24,34 Q15,43 9,52" stroke="#f5c49a" stroke-width="8" stroke-linecap="round" fill="none"/>
  <circle cx="10" cy="51" r="4" fill="#f0b888"/>
  <path d="M10,51 Q7,59 6,67" stroke="#f5c49a" stroke-width="7" stroke-linecap="round" fill="none"/>
  <circle cx="6" cy="68" r="3.5" fill="#f5c49a"/>
  <!-- neck -->
  <rect x="37" y="27" width="8" height="6" rx="2" fill="#f5c49a"/>
  <!-- head (looking right) -->
  <circle cx="41" cy="16" r="11" fill="#f5c49a"/>
  <path d="M30,13 Q41,5 52,13 Q51,8 41,6 Q31,8 30,13Z" fill="#2c1b10"/>
  <ellipse cx="37" cy="15" rx="1.8" ry="2.2" fill="#1a0a00"/>
  <ellipse cx="45" cy="15" rx="1.8" ry="2.2" fill="#1a0a00"/>
  <ellipse cx="37.8" cy="14" rx=".6" ry=".8" fill="rgba(255,255,255,.65)"/>
  <ellipse cx="45.8" cy="14" rx=".6" ry=".8" fill="rgba(255,255,255,.65)"/>
  <path d="M38,20 Q41,22 44,20" stroke="#c07050" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- right arm (swinging right for momentum) -->
  <path d="M59,34 Q68,43 73,52" stroke="#e0b070" stroke-width="8" stroke-linecap="round" fill="none"/>
  <circle cx="72" cy="51" r="4" fill="#d8a868"/>
  <path d="M72,51 Q75,59 76,67" stroke="#e0b070" stroke-width="7" stroke-linecap="round" fill="none"/>
  <circle cx="76" cy="68" r="3.5" fill="#e0b070"/>
</svg>
