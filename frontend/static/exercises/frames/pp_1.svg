<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 110">
  <!-- ping pong ready position - low athletic stance, paddle in front -->
  <ellipse cx="40" cy="108" rx="22" ry="3" fill="rgba(0,0,0,.15)"/>
  <!-- right leg (back, wide stance, knee bent) -->
  <path d="M50,70 Q58,80 62,90" stroke="#162d4a" stroke-width="11" stroke-linecap="round" fill="none"/>
  <circle cx="62" cy="89" r="5" fill="#162d4a"/>
  <path d="M62,89 Q62,97 61,104" stroke="#1a2d42" stroke-width="10" stroke-linecap="round" fill="none"/>
  <path d="M54,104 Q61,108 69,108 Q71,107 71,104 Q70,101 66,100 L60,100Z" fill="#ddd"/>
  <!-- shorts (low, wide squat stance) -->
  <path d="M23,68 Q40,75 57,68 L54,83 Q40,86 26,83Z" fill="#1e3a5f"/>
  <path d="M23,68 L25,85 L34,85 L36,68Z" fill="#1a3158"/>
  <path d="M44,68 L46,83 L55,83 L57,68Z" fill="#1a3158"/>
  <!-- shirt (forward lean) -->
  <path d="M20,32 Q40,27 60,32 L57,69 Q40,74 23,69Z" fill="#ef4444"/>
  <path d="M20,32 Q40,29 60,32 L57,46 Q40,48 23,46Z" fill="rgba(255,255,255,.08)"/>
  <!-- left leg (wide stance, knee bent) -->
  <path d="M30,70 Q22,80 18,90" stroke="#1e3a5f" stroke-width="11" stroke-linecap="round" fill="none"/>
  <circle cx="18" cy="89" r="5" fill="#243352"/>
  <path d="M18,89 Q18,97 19,104" stroke="#243352" stroke-width="10" stroke-linecap="round" fill="none"/>
  <path d="M11,104 Q19,108 27,108 Q29,107 29,104 Q28,101 24,100 L18,100Z" fill="#e8e8e8"/>
  <!-- neck -->
  <rect x="36" y="27" width="8" height="7" rx="2" fill="#f5c49a"/>
  <!-- head -->
  <circle cx="40" cy="16" r="11" fill="#f5c49a"/>
  <path d="M29,13 Q40,5 51,13 Q50,8 40,6 Q30,8 29,13Z" fill="#2c1b10"/>
  <ellipse cx="36" cy="15" rx="1.8" ry="2.2" fill="#1a0a00"/>
  <ellipse cx="44" cy="15" rx="1.8" ry="2.2" fill="#1a0a00"/>
  <ellipse cx="36.8" cy="14" rx=".6" ry=".8" fill="rgba(255,255,255,.65)"/>
  <ellipse cx="44.8" cy="14" rx=".6" ry=".8" fill="rgba(255,255,255,.65)"/>
  <path d="M37.5,20 Q40,22 42.5,20" stroke="#c07050" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- left arm (back, low guard) -->
  <path d="M22,36 Q18,50 17,62" stroke="#f5c49a" stroke-width="8" stroke-linecap="round" fill="none"/>
  <circle cx="17" cy="61" r="4" fill="#f0b888"/>
  <path d="M17,61 Q17,68 18,74" stroke="#f5c49a" stroke-width="7" stroke-linecap="round" fill="none"/>
  <circle cx="18" cy="75" r="3.5" fill="#f5c49a"/>
  <!-- right arm with paddle (ready position) -->
  <path d="M58,36 Q63,49 62,60" stroke="#f5c49a" stroke-width="8" stroke-linecap="round" fill="none"/>
  <circle cx="62" cy="59" r="4" fill="#f0b888"/>
  <path d="M62,59 Q58,66 54,72" stroke="#f5c49a" stroke-width="7" stroke-linecap="round" fill="none"/>
  <!-- paddle handle -->
  <line x1="54" y1="72" x2="47" y2="80" stroke="#8B4513" stroke-width="4" stroke-linecap="round"/>
  <!-- paddle blade -->
  <ellipse cx="42" cy="84" rx="9" ry="7" fill="#c0392b" transform="rotate(-30 42 84)"/>
  <ellipse cx="42" cy="84" rx="7.5" ry="5.5" fill="#e74c3c" transform="rotate(-30 42 84)"/>
  <!-- paddle edge -->
  <ellipse cx="42" cy="84" rx="9" ry="7" fill="none" stroke="#922b21" stroke-width="1" transform="rotate(-30 42 84)"/>
</svg>
