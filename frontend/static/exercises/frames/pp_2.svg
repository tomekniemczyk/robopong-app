<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 110">
  <!-- FH backswing – right arm pulled back, weight on right foot -->
  <ellipse cx="42" cy="108" rx="20" ry="3" fill="rgba(0,0,0,.15)"/>
  <!-- right leg (bearing weight) -->
  <path d="M50,70 Q57,80 60,91" stroke="#162d4a" stroke-width="11" stroke-linecap="round" fill="none"/>
  <circle cx="60" cy="90" r="5" fill="#162d4a"/>
  <path d="M60,90 Q61,98 61,105" stroke="#1a2d42" stroke-width="10" stroke-linecap="round" fill="none"/>
  <path d="M54,105 Q61,109 69,109 Q71,108 71,105 Q70,102 66,101 L60,101Z" fill="#ddd"/>
  <!-- shorts -->
  <path d="M23,68 Q40,75 57,68 L54,83 Q40,86 26,83Z" fill="#1e3a5f"/>
  <path d="M23,68 L25,85 L34,85 L36,68Z" fill="#1a3158"/>
  <path d="M44,68 L46,83 L55,83 L57,68Z" fill="#1a3158"/>
  <!-- shirt (rotated/turned to right for backswing) -->
  <path d="M21,31 Q40,27 60,32 L57,69 Q40,74 24,69Z" fill="#ef4444"/>
  <path d="M21,31 Q40,28 60,32 L57,45 Q40,47 24,45Z" fill="rgba(255,255,255,.08)"/>
  <!-- left arm (forward, balancing) -->
  <path d="M22,35 Q19,46 18,56" stroke="#f5c49a" stroke-width="8" stroke-linecap="round" fill="none"/>
  <circle cx="18" cy="55" r="4" fill="#f0b888"/>
  <path d="M18,55 Q17,65 17,73" stroke="#f5c49a" stroke-width="7" stroke-linecap="round" fill="none"/>
  <circle cx="17" cy="74" r="3.5" fill="#f5c49a"/>
  <!-- left leg (extended back slightly) -->
  <path d="M30,70 Q24,80 20,91" stroke="#1e3a5f" stroke-width="11" stroke-linecap="round" fill="none"/>
  <circle cx="20" cy="90" r="5" fill="#243352"/>
  <path d="M20,90 Q19,98 19,105" stroke="#243352" stroke-width="10" stroke-linecap="round" fill="none"/>
  <path d="M11,105 Q19,109 27,109 Q29,108 29,105 Q28,102 24,101 L18,101Z" fill="#e8e8e8"/>
  <!-- neck -->
  <rect x="36" y="27" width="8" height="7" rx="2" fill="#f5c49a"/>
  <!-- head (turned slightly right) -->
  <circle cx="41" cy="16" r="11" fill="#f5c49a"/>
  <path d="M30,13 Q41,5 52,13 Q51,8 41,6 Q31,8 30,13Z" fill="#2c1b10"/>
  <ellipse cx="37" cy="15" rx="1.8" ry="2.2" fill="#1a0a00"/>
  <ellipse cx="45" cy="15" rx="1.8" ry="2.2" fill="#1a0a00"/>
  <ellipse cx="37.8" cy="14" rx=".6" ry=".8" fill="rgba(255,255,255,.65)"/>
  <ellipse cx="45.8" cy="14" rx=".6" ry=".8" fill="rgba(255,255,255,.65)"/>
  <path d="M38,20 Q41,22 44,20" stroke="#c07050" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- right arm backswing (back and low, pulling the paddle back) -->
  <path d="M59,35 Q66,43 70,52" stroke="#f5c49a" stroke-width="8" stroke-linecap="round" fill="none"/>
  <circle cx="69" cy="52" r="4" fill="#f0b888"/>
  <path d="M69,52 Q72,61 73,68" stroke="#f5c49a" stroke-width="7" stroke-linecap="round" fill="none"/>
  <!-- paddle in backswing (blade pointing down-right, edge to opponent) -->
  <line x1="73" y1="68" x2="74" y2="78" stroke="#8B4513" stroke-width="4" stroke-linecap="round"/>
  <ellipse cx="73" cy="84" rx="9" ry="7" fill="#c0392b" transform="rotate(20 73 84)"/>
  <ellipse cx="73" cy="84" rx="7.5" ry="5.5" fill="#e74c3c" transform="rotate(20 73 84)"/>
  <ellipse cx="73" cy="84" rx="9" ry="7" fill="none" stroke="#922b21" stroke-width="1" transform="rotate(20 73 84)"/>
</svg>
