<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 252 110">
  <!-- Frame 1: Standing, arms at sides, breathing -->
  <g transform="translate(0,0)">
    <rect width="80" height="110" fill="#f0fdfa"/>
    <ellipse cx="40" cy="107" rx="14" ry="3" fill="rgba(0,0,0,.1)"/>
    <ellipse cx="40" cy="12" rx="9" ry="10" fill="#f0c090"/>
    <path d="M31,7 Q40,1 49,7 L49,13 Q40,8 31,13Z" fill="#5c3a1e"/>
    <rect x="37" y="21" width="7" height="5" rx="2" fill="#f0c090"/>
    <path d="M25,26 Q40,22 55,26 L57,62 Q40,67 23,62Z" fill="#0ea5e9"/>
    <path d="M25,29 Q20,42 18,55" stroke="#f0c090" stroke-width="7" stroke-linecap="round" fill="none"/>
    <circle cx="18" cy="56" r="4" fill="#f0c090"/>
    <path d="M55,29 Q60,42 62,55" stroke="#f0c090" stroke-width="7" stroke-linecap="round" fill="none"/>
    <circle cx="62" cy="56" r="4" fill="#f0c090"/>
    <path d="M36,62 Q34,80 33,97" stroke="#1e3a5f" stroke-width="9" stroke-linecap="round" fill="none"/>
    <ellipse cx="30" cy="98" rx="7" ry="4" fill="#111" transform="rotate(-5 30 98)"/>
    <path d="M44,62 Q46,80 47,97" stroke="#1e3a5f" stroke-width="9" stroke-linecap="round" fill="none"/>
    <ellipse cx="50" cy="98" rx="7" ry="4" fill="#111" transform="rotate(5 50 98)"/>
  </g>
  <!-- Frame 2: Arms raised overhead, slight arch back -->
  <g transform="translate(86,0)">
    <rect width="80" height="110" fill="#f0fdfa"/>
    <ellipse cx="40" cy="107" rx="14" ry="3" fill="rgba(0,0,0,.1)"/>
    <!-- head slightly back -->
    <ellipse cx="40" cy="11" rx="9" ry="10" fill="#f0c090"/>
    <path d="M31,6 Q40,0 49,6 L49,12 Q40,7 31,12Z" fill="#5c3a1e"/>
    <rect x="37" y="20" width="7" height="5" rx="2" fill="#f0c090"/>
    <!-- torso slightly arched -->
    <path d="M26,24 Q40,20 54,24 L55,60 Q40,65 25,60Z" fill="#0ea5e9"/>
    <!-- both arms sweeping up and overhead -->
    <path d="M26,27 Q18,12 13,2" stroke="#f0c090" stroke-width="7" stroke-linecap="round" fill="none"/>
    <circle cx="13" cy="1" r="4" fill="#f0c090"/>
    <path d="M54,27 Q62,12 67,2" stroke="#f0c090" stroke-width="7" stroke-linecap="round" fill="none"/>
    <circle cx="67" cy="1" r="4" fill="#f0c090"/>
    <!-- legs together, on toes slightly -->
    <path d="M36,60 Q34,78 33,95" stroke="#1e3a5f" stroke-width="9" stroke-linecap="round" fill="none"/>
    <ellipse cx="31" cy="96" rx="6" ry="3.5" fill="#111" transform="rotate(-5 31 96)"/>
    <path d="M44,60 Q46,78 47,95" stroke="#1e3a5f" stroke-width="9" stroke-linecap="round" fill="none"/>
    <ellipse cx="49" cy="96" rx="6" ry="3.5" fill="#111" transform="rotate(5 49 96)"/>
  </g>
  <!-- Frame 3: Side lean — right arm up, left arm down -->
  <g transform="translate(172,0)">
    <rect width="80" height="110" fill="#f0fdfa"/>
    <ellipse cx="40" cy="107" rx="14" ry="3" fill="rgba(0,0,0,.1)"/>
    <!-- head leaning right -->
    <ellipse cx="42" cy="12" rx="9" ry="10" fill="#f0c090"/>
    <path d="M33,7 Q42,1 51,7 L51,13 Q42,8 33,13Z" fill="#5c3a1e"/>
    <rect x="39" y="21" width="7" height="5" rx="2" fill="#f0c090"/>
    <!-- torso leaning right -->
    <path d="M26,25 Q41,22 56,26 L55,62 Q40,66 26,61Z" fill="#0ea5e9"/>
    <!-- R arm up overhead -->
    <path d="M56,28 Q61,13 65,2" stroke="#f0c090" stroke-width="7" stroke-linecap="round" fill="none"/>
    <circle cx="65" cy="1" r="4" fill="#f0c090"/>
    <!-- L arm down along body, reaching down -->
    <path d="M26,28 Q22,44 20,60" stroke="#f0c090" stroke-width="7" stroke-linecap="round" fill="none"/>
    <circle cx="20" cy="61" r="4" fill="#f0c090"/>
    <!-- legs together -->
    <path d="M37,62 Q35,80 34,97" stroke="#1e3a5f" stroke-width="9" stroke-linecap="round" fill="none"/>
    <ellipse cx="31" cy="98" rx="7" ry="4" fill="#111" transform="rotate(-5 31 98)"/>
    <path d="M45,62 Q47,80 48,97" stroke="#1e3a5f" stroke-width="9" stroke-linecap="round" fill="none"/>
    <ellipse cx="51" cy="98" rx="7" ry="4" fill="#111" transform="rotate(5 51 98)"/>
  </g>
</svg>
