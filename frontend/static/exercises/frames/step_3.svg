  <ellipse cx="36.8" cy="13" rx=".6" ry=".8" fill="rgba(255,255,255,.65)"/>
  <ellipse cx="44.8" cy="13" rx=".6" ry=".8" fill="rgba(255,255,255,.65)"/>
  <path d="M37.5,19 Q40,21 42.5,19" stroke="#c07050" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- left arm (returning to guard) -->
  <path d="M23,35 Q17,47 15,58" stroke="#f5c49a" stroke-width="8" stroke-linecap="round" fill="none"/>
  <circle cx="15" cy="57" r="4" fill="#f0b888"/>
