  <path d="M33,66 Q31,78 30,89" stroke="#1e3a5f" stroke-width="11" stroke-linecap="round" fill="none"/>
  <circle cx="30" cy="88" r="5" fill="#243352"/>
  <path d="M30,88 Q28,97 28,105" stroke="#243352" stroke-width="10" stroke-linecap="round" fill="none"/>
  <path d="M20,105 Q28,109 36,109 Q38,108 38,105 Q37,102 33,101 L27,101Z" fill="#e8e8e8"/>
  <!-- neck -->
  <rect x="36" y="26" width="8" height="7" rx="2" fill="#f5c49a"/>
