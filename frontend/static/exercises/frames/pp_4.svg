<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 110">
  <!-- FH follow-through – arm extended forward-up, weight on left -->
  <ellipse cx="35" cy="108" rx="20" ry="3" fill="rgba(0,0,0,.15)"/>
  <!-- right leg (back, toe pivot) -->
  <path d="M52,70 Q57,82 59,93" stroke="#162d4a" stroke-width="11" stroke-linecap="round" fill="none"/>
  <circle cx="59" cy="92" r="5" fill="#162d4a"/>
  <path d="M59,92 Q60,100 60,106" stroke="#1a2d42" stroke-width="10" stroke-linecap="round" fill="none"/>
  <path d="M53,106 Q60,110 68,110 Q70,109 70,106 Q69,103 65,102 L59,102Z" fill="#ddd"/>
  <!-- shorts -->
  <path d="M23,68 Q40,75 57,68 L54,83 Q40,86 26,83Z" fill="#1e3a5f"/>
  <path d="M23,68 L25,85 L34,85 L36,68Z" fill="#1a3158"/>
  <path d="M44,68 L46,83 L55,83 L57,68Z" fill="#1a3158"/>
  <!-- shirt -->
  <path d="M20,31 Q39,27 58,31 L56,69 Q39,74 22,69Z" fill="#ef4444"/>
  <path d="M20,31 Q39,28 58,31 L56,45 Q39,47 22,45Z" fill="rgba(255,255,255,.08)"/>
  <!-- left leg (weight bearing, bent) -->
  <path d="M28,70 Q22,81 18,92" stroke="#1e3a5f" stroke-width="11" stroke-linecap="round" fill="none"/>
  <circle cx="18" cy="91" r="5" fill="#243352"/>
  <path d="M18,91 Q18,99 18,106" stroke="#243352" stroke-width="10" stroke-linecap="round" fill="none"/>
  <path d="M10,106 Q18,110 26,110 Q28,109 28,106 Q27,103 23,102 L17,102Z" fill="#e8e8e8"/>
  <!-- left arm (guard/balance) -->
  <path d="M22,35 Q18,47 17,58" stroke="#e0b070" stroke-width="8" stroke-linecap="round" fill="none"/>
  <circle cx="17" cy="57" r="4" fill="#d8a868"/>
  <path d="M17,57 Q17,66 18,73" stroke="#e0b070" stroke-width="7" stroke-linecap="round" fill="none"/>
  <circle cx="18" cy="74" r="3.5" fill="#e0b070"/>
  <!-- neck -->
  <rect x="36" y="27" width="8" height="7" rx="2" fill="#f5c49a"/>
  <!-- head -->
  <circle cx="40" cy="16" r="11" fill="#f5c49a"/>
  <path d="M29,13 Q40,5 51,13 Q50,8 40,6 Q30,8 29,13Z" fill="#2c1b10"/>
  <ellipse cx="36" cy="15" rx="1.8" ry="2.2" fill="#1a0a00"/>
  <ellipse cx="44" cy="15" rx="1.8" ry="2.2" fill="#1a0a00"/>
  <ellipse cx="36.8" cy="14" rx=".6" ry=".8" fill="rgba(255,255,255,.65)"/>
  <ellipse cx="44.8" cy="14" rx=".6" ry=".8" fill="rgba(255,255,255,.65)"/>
  <path d="M37.5,20 Q40,22 42.5,20" stroke="#c07050" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- right arm follow-through (arm extended forward-up, crossing body) -->
  <path d="M58,35 Q60,22 58,12" stroke="#f5c49a" stroke-width="8" stroke-linecap="round" fill="none"/>
  <circle cx="58" cy="13" r="4" fill="#f0b888"/>
  <path d="M58,13 Q54,6 50,2" stroke="#f5c49a" stroke-width="7" stroke-linecap="round" fill="none"/>
  <!-- paddle in follow-through (blade rotated up-left) -->
  <line x1="50" y1="2" x2="42" y2="-2" stroke="#8B4513" stroke-width="4" stroke-linecap="round"/>
  <ellipse cx="36" cy="-3" rx="9" ry="7" fill="#c0392b" transform="rotate(-50 36 -3)"/>
  <ellipse cx="36" cy="-3" rx="7.5" ry="5.5" fill="#e74c3c" transform="rotate(-50 36 -3)"/>
</svg>
