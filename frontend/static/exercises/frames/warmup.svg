<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 252 110">
  <!-- Frame 1: Standing, light arm swing -->
  <g transform="translate(0,0)">
    <rect width="80" height="110" fill="#fff8f4"/>
    <ellipse cx="40" cy="107" rx="14" ry="3" fill="rgba(0,0,0,.1)"/>
    <ellipse cx="40" cy="12" rx="9" ry="10" fill="#f0c090"/>
    <path d="M31,7 Q40,1 49,7 L49,13 Q40,8 31,13Z" fill="#5c3a1e"/>
    <rect x="37" y="21" width="7" height="5" rx="2" fill="#f0c090"/>
    <path d="M25,26 Q40,22 55,26 L57,62 Q40,67 23,62Z" fill="#f97316"/>
    <!-- arms slightly out -->
    <path d="M25,29 Q19,40 16,54" stroke="#f0c090" stroke-width="7" stroke-linecap="round" fill="none"/>
    <circle cx="16" cy="55" r="4" fill="#f0c090"/>
    <path d="M55,29 Q61,40 64,54" stroke="#f0c090" stroke-width="7" stroke-linecap="round" fill="none"/>
    <circle cx="64" cy="55" r="4" fill="#f0c090"/>
    <!-- legs together -->
    <path d="M36,62 Q34,80 33,97" stroke="#1e3a5f" stroke-width="9" stroke-linecap="round" fill="none"/>
    <ellipse cx="30" cy="99" rx="7" ry="4" fill="#111" transform="rotate(-5 30 99)"/>
    <path d="M44,62 Q46,80 47,97" stroke="#1e3a5f" stroke-width="9" stroke-linecap="round" fill="none"/>
    <ellipse cx="50" cy="99" rx="7" ry="4" fill="#111" transform="rotate(5 50 99)"/>
  </g>
  <!-- Frame 2: Jogging — left knee up, right arm forward -->
  <g transform="translate(86,0)">
    <rect width="80" height="110" fill="#fff8f4"/>
    <ellipse cx="40" cy="107" rx="14" ry="3" fill="rgba(0,0,0,.1)"/>
    <ellipse cx="41" cy="12" rx="9" ry="10" fill="#f0c090"/>
    <path d="M32,7 Q41,1 50,7 L50,13 Q41,8 32,13Z" fill="#5c3a1e"/>
    <rect x="38" y="21" width="7" height="5" rx="2" fill="#f0c090"/>
    <path d="M26,26 Q41,22 56,27 L56,62 Q41,67 24,62Z" fill="#f97316"/>
    <!-- L arm back, R arm forward-up -->
    <path d="M26,30 Q22,43 20,56" stroke="#f0c090" stroke-width="7" stroke-linecap="round" fill="none"/>
    <circle cx="20" cy="57" r="4" fill="#f0c090"/>
    <path d="M56,30 Q58,17 60,7" stroke="#f0c090" stroke-width="7" stroke-linecap="round" fill="none"/>
    <circle cx="60" cy="6" r="4" fill="#f0c090"/>
    <!-- L knee up -->
    <path d="M36,62 Q42,65 48,64" stroke="#1e3a5f" stroke-width="9" stroke-linecap="round" fill="none"/>
    <path d="M48,64 Q50,74 50,83" stroke="#1e3a5f" stroke-width="9" stroke-linecap="round" fill="none"/>
    <ellipse cx="51" cy="84" rx="6" ry="3.5" fill="#111" transform="rotate(5 51 84)"/>
    <!-- R leg push-off -->
    <path d="M44,62 Q46,80 47,97" stroke="#1e3a5f" stroke-width="9" stroke-linecap="round" fill="none"/>
    <ellipse cx="49" cy="98" rx="7" ry="4" fill="#111" transform="rotate(5 49 98)"/>
  </g>
  <!-- Frame 3: Arms raised overhead stretch -->
  <g transform="translate(172,0)">
    <rect width="80" height="110" fill="#fff8f4"/>
    <ellipse cx="40" cy="107" rx="14" ry="3" fill="rgba(0,0,0,.1)"/>
    <ellipse cx="40" cy="11" rx="9" ry="10" fill="#f0c090"/>
    <path d="M31,6 Q40,0 49,6 L49,12 Q40,7 31,12Z" fill="#5c3a1e"/>
    <rect x="37" y="20" width="7" height="5" rx="2" fill="#f0c090"/>
    <path d="M25,25 Q40,21 55,25 L57,61 Q40,66 23,61Z" fill="#f97316"/>
    <!-- both arms raised -->
    <path d="M25,28 Q18,14 13,4" stroke="#f0c090" stroke-width="7" stroke-linecap="round" fill="none"/>
    <circle cx="13" cy="3" r="4" fill="#f0c090"/>
    <path d="M55,28 Q62,14 67,4" stroke="#f0c090" stroke-width="7" stroke-linecap="round" fill="none"/>
    <circle cx="67" cy="3" r="4" fill="#f0c090"/>
    <!-- legs slightly apart, on toes -->
    <path d="M36,61 Q33,79 31,96" stroke="#1e3a5f" stroke-width="9" stroke-linecap="round" fill="none"/>
    <ellipse cx="28" cy="97" rx="7" ry="4" fill="#111" transform="rotate(-5 28 97)"/>
    <path d="M44,61 Q47,79 49,96" stroke="#1e3a5f" stroke-width="9" stroke-linecap="round" fill="none"/>
    <ellipse cx="52" cy="97" rx="7" ry="4" fill="#111" transform="rotate(5 52 97)"/>
  </g>
</svg>
