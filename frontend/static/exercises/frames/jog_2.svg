<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 110">
  <!-- shadow (right side - weight on right leg) -->
  <ellipse cx="49" cy="108" rx="13" ry="2.5" fill="rgba(0,0,0,.15)"/>
  <!-- right leg (supporting, on ground) -->
  <path d="M47,65 Q50,78 51,89" stroke="#162d4a" stroke-width="11" stroke-linecap="round" fill="none"/>
  <circle cx="51" cy="88" r="5" fill="#162d4a"/>
  <path d="M51,88 Q52,97 53,105" stroke="#1a2d42" stroke-width="10" stroke-linecap="round" fill="none"/>
  <path d="M46,105 Q53,109 61,109 Q63,108 63,105 Q62,102 58,101 L52,101Z" fill="#ddd"/>
  <line x1="46" y1="106" x2="61" y2="110" stroke="#888" stroke-width="1" stroke-linecap="round"/>
  <!-- shorts -->
  <path d="M27,63 Q41,70 55,62 L52,77 Q40,82 28,79Z" fill="#1e3a5f"/>
  <path d="M27,63 L28,81 L37,81 L38,63Z" fill="#1a3158"/>
  <path d="M43,62 L44,76 L52,76 L55,62Z" fill="#1a3158"/>
  <!-- shirt (slight forward lean) -->
  <path d="M22,29 Q40,25 58,29 L56,64 Q40,69 24,64Z" fill="#f97316"/>
  <path d="M22,29 Q40,26 58,29 L56,43 Q40,45 24,43Z" fill="rgba(255,255,255,.08)"/>
  <!-- right arm (forward swing – bent elbow pointing forward-up) -->
  <path d="M57,33 Q61,20 63,11" stroke="#e0b070" stroke-width="8" stroke-linecap="round" fill="none"/>
  <circle cx="63" cy="12" r="4" fill="#d8a868"/>
  <path d="M63,12 Q60,5 57,1" stroke="#e0b070" stroke-width="7" stroke-linecap="round" fill="none"/>
  <!-- left leg (knee up – thigh forward, calf tucked back) -->
  <path d="M33,65 Q41,56 46,49" stroke="#1e3a5f" stroke-width="11" stroke-linecap="round" fill="none"/>
  <circle cx="45" cy="50" r="5" fill="#243352"/>
  <path d="M45,50 Q49,60 50,70" stroke="#243352" stroke-width="10" stroke-linecap="round" fill="none"/>
  <path d="M46,70 Q50,74 55,73 Q57,71 56,69 Q55,67 52,67 L47,67Z" fill="#e8e8e8"/>
  <line x1="46" y1="71" x2="55" y2="74" stroke="#888" stroke-width="1" stroke-linecap="round"/>
  <!-- neck -->
  <rect x="36" y="25" width="8" height="6" rx="2" fill="#f5c49a"/>
  <!-- head -->
  <circle cx="40" cy="14" r="11" fill="#f5c49a"/>
  <path d="M29,11 Q40,3 51,11 Q50,6 40,4 Q30,6 29,11Z" fill="#2c1b10"/>
  <ellipse cx="36" cy="13" rx="1.8" ry="2.2" fill="#1a0a00"/>
  <ellipse cx="44" cy="13" rx="1.8" ry="2.2" fill="#1a0a00"/>
  <ellipse cx="36.8" cy="12" rx=".6" ry=".8" fill="rgba(255,255,255,.65)"/>
  <ellipse cx="44.8" cy="12" rx=".6" ry=".8" fill="rgba(255,255,255,.65)"/>
  <path d="M37.5,18 Q40,20 42.5,18" stroke="#c07050" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- left arm (back swing) -->
  <path d="M23,33 Q15,47 13,59" stroke="#f5c49a" stroke-width="8" stroke-linecap="round" fill="none"/>
  <circle cx="14" cy="58" r="4" fill="#f0b888"/>
  <path d="M14,58 Q12,67 11,75" stroke="#f5c49a" stroke-width="7" stroke-linecap="round" fill="none"/>
  <circle cx="11" cy="76" r="3.5" fill="#f5c49a"/>
</svg>
