<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 252 110">
  <!-- Frame 1: Standing before exercise -->
  <g transform="translate(0,0)">
    <rect width="80" height="110" fill="#faf5ff"/>
    <ellipse cx="40" cy="107" rx="14" ry="3" fill="rgba(0,0,0,.1)"/>
    <ellipse cx="40" cy="12" rx="9" ry="10" fill="#f0c090"/>
    <path d="M31,7 Q40,1 49,7 L49,13 Q40,8 31,13Z" fill="#5c3a1e"/>
    <rect x="37" y="21" width="7" height="5" rx="2" fill="#f0c090"/>
    <path d="M25,26 Q40,22 55,26 L57,62 Q40,67 23,62Z" fill="#8b5cf6"/>
    <path d="M25,29 Q20,42 18,55" stroke="#f0c090" stroke-width="7" stroke-linecap="round" fill="none"/>
    <circle cx="18" cy="56" r="4" fill="#f0c090"/>
    <path d="M55,29 Q60,42 62,55" stroke="#f0c090" stroke-width="7" stroke-linecap="round" fill="none"/>
    <circle cx="62" cy="56" r="4" fill="#f0c090"/>
    <path d="M36,62 Q34,80 33,97" stroke="#1e3a5f" stroke-width="9" stroke-linecap="round" fill="none"/>
    <ellipse cx="30" cy="98" rx="7" ry="4" fill="#111"/>
    <path d="M44,62 Q46,80 47,97" stroke="#1e3a5f" stroke-width="9" stroke-linecap="round" fill="none"/>
    <ellipse cx="50" cy="98" rx="7" ry="4" fill="#111"/>
  </g>
  <!-- Frame 2: Plank / push-up high — side view -->
  <g transform="translate(86,0)">
    <rect width="80" height="110" fill="#faf5ff"/>
    <!-- figure horizontal, side view — head left -->
    <ellipse cx="68" cy="107" rx="12" ry="2.5" fill="rgba(0,0,0,.1)"/>
    <ellipse cx="10" cy="107" rx="12" ry="2.5" fill="rgba(0,0,0,.1)"/>
    <!-- head (left side, side profile) -->
    <ellipse cx="8" cy="56" rx="8" ry="9" fill="#f0c090"/>
    <path d="M1,52 Q8,46 15,52 L15,57 Q8,52 1,57Z" fill="#5c3a1e"/>
    <!-- neck -->
    <rect x="15" y="57" width="5" height="6" rx="2" fill="#f0c090"/>
    <!-- torso horizontal -->
    <path d="M19,56 Q40,54 62,56 L63,65 Q40,67 18,65Z" fill="#8b5cf6"/>
    <!-- L arm down (support) — left arm at top of push-up -->
    <path d="M20,60 Q19,76 19,90" stroke="#f0c090" stroke-width="7" stroke-linecap="round" fill="none"/>
    <ellipse cx="19" cy="92" rx="5" ry="3" fill="#f0c090"/>
    <!-- R arm down -->
    <path d="M55,60 Q55,76 55,90" stroke="#f0c090" stroke-width="7" stroke-linecap="round" fill="none"/>
    <ellipse cx="55" cy="92" rx="5" ry="3" fill="#f0c090"/>
    <!-- legs horizontal, straight -->
    <path d="M62,61 Q68,64 73,67" stroke="#1e3a5f" stroke-width="9" stroke-linecap="round" fill="none"/>
    <ellipse cx="76" cy="68" rx="5" ry="8" fill="#111" transform="rotate(-15 76 68)"/>
    <!-- feet on floor -->
    <ellipse cx="20" cy="93" rx="5" ry="3" fill="#111"/>
    <ellipse cx="54" cy="93" rx="5" ry="3" fill="#111"/>
  </g>
  <!-- Frame 3: Push-up low — chest near floor, side view -->
  <g transform="translate(172,0)">
    <rect width="80" height="110" fill="#faf5ff"/>
    <ellipse cx="68" cy="107" rx="12" ry="2.5" fill="rgba(0,0,0,.1)"/>
    <ellipse cx="10" cy="107" rx="12" ry="2.5" fill="rgba(0,0,0,.1)"/>
    <!-- head lower -->
    <ellipse cx="8" cy="65" rx="8" ry="9" fill="#f0c090"/>
    <path d="M1,61 Q8,55 15,61 L15,66 Q8,61 1,66Z" fill="#5c3a1e"/>
    <rect x="15" y="66" width="5" height="6" rx="2" fill="#f0c090"/>
    <!-- torso lower, almost on ground -->
    <path d="M19,65 Q40,63 62,65 L63,73 Q40,75 18,73Z" fill="#8b5cf6"/>
    <!-- arms bent (elbows out) -->
    <path d="M22,68 Q18,78 18,90" stroke="#f0c090" stroke-width="7" stroke-linecap="round" fill="none"/>
    <ellipse cx="18" cy="92" rx="5" ry="3" fill="#f0c090"/>
    <path d="M52,68 Q52,79 52,90" stroke="#f0c090" stroke-width="7" stroke-linecap="round" fill="none"/>
    <ellipse cx="52" cy="92" rx="5" ry="3" fill="#f0c090"/>
    <!-- legs flat -->
    <path d="M62,69 Q68,71 74,73" stroke="#1e3a5f" stroke-width="9" stroke-linecap="round" fill="none"/>
    <ellipse cx="76" cy="74" rx="5" ry="7" fill="#111" transform="rotate(-8 76 74)"/>
    <ellipse cx="18" cy="93" rx="5" ry="3" fill="#111"/>
    <ellipse cx="52" cy="93" rx="5" ry="3" fill="#111"/>
  </g>
</svg>
