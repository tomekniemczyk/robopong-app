<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 110">
  <!-- FH contact point – arm driving forward, paddle open face -->
  <ellipse cx="40" cy="108" rx="20" ry="3" fill="rgba(0,0,0,.15)"/>
  <!-- left leg (weight shifting forward-left) -->
  <path d="M28,70 Q22,81 18,92" stroke="#1e3a5f" stroke-width="11" stroke-linecap="round" fill="none"/>
  <circle cx="18" cy="91" r="5" fill="#243352"/>
  <path d="M18,91 Q18,99 18,105" stroke="#243352" stroke-width="10" stroke-linecap="round" fill="none"/>
  <path d="M10,105 Q18,109 26,109 Q28,108 28,105 Q27,102 23,101 L17,101Z" fill="#e8e8e8"/>
  <!-- shorts -->
  <path d="M23,68 Q40,75 57,68 L54,83 Q40,86 26,83Z" fill="#1e3a5f"/>
  <path d="M23,68 L25,85 L34,85 L36,68Z" fill="#1a3158"/>
  <path d="M44,68 L46,83 L55,83 L57,68Z" fill="#1a3158"/>
  <!-- shirt (body rotating into stroke) -->
  <path d="M21,31 Q40,27 59,31 L56,69 Q40,74 23,69Z" fill="#ef4444"/>
  <path d="M21,31 Q40,28 59,31 L56,45 Q40,47 23,45Z" fill="rgba(255,255,255,.08)"/>
  <!-- right leg (pivot/push-off) -->
  <path d="M52,70 Q57,81 60,92" stroke="#162d4a" stroke-width="11" stroke-linecap="round" fill="none"/>
  <circle cx="60" cy="91" r="5" fill="#162d4a"/>
  <path d="M60,91 Q61,99 61,105" stroke="#1a2d42" stroke-width="10" stroke-linecap="round" fill="none"/>
  <path d="M54,105 Q61,109 69,109 Q71,108 71,105 Q70,102 66,101 L60,101Z" fill="#ddd"/>
  <!-- left arm (guard position) -->
  <path d="M22,35 Q17,47 15,58" stroke="#e0b070" stroke-width="8" stroke-linecap="round" fill="none"/>
  <circle cx="15" cy="57" r="4" fill="#d8a868"/>
  <path d="M15,57 Q15,66 16,73" stroke="#e0b070" stroke-width="7" stroke-linecap="round" fill="none"/>
  <circle cx="16" cy="74" r="3.5" fill="#e0b070"/>
  <!-- neck -->
  <rect x="36" y="27" width="8" height="7" rx="2" fill="#f5c49a"/>
  <!-- head -->
  <circle cx="40" cy="16" r="11" fill="#f5c49a"/>
  <path d="M29,13 Q40,5 51,13 Q50,8 40,6 Q30,8 29,13Z" fill="#2c1b10"/>
  <ellipse cx="36" cy="15" rx="1.8" ry="2.2" fill="#1a0a00"/>
  <ellipse cx="44" cy="15" rx="1.8" ry="2.2" fill="#1a0a00"/>
  <ellipse cx="36.8" cy="14" rx=".6" ry=".8" fill="rgba(255,255,255,.65)"/>
  <ellipse cx="44.8" cy="14" rx=".6" ry=".8" fill="rgba(255,255,255,.65)"/>
  <path d="M37.5,20 Q40,22 42.5,20" stroke="#c07050" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- right arm driving through (contact point – arm extended forward at table height) -->
  <path d="M59,35 Q64,46 62,57" stroke="#f5c49a" stroke-width="8" stroke-linecap="round" fill="none"/>
  <circle cx="62" cy="56" r="4" fill="#f0b888"/>
  <path d="M62,56 Q58,63 53,68" stroke="#f5c49a" stroke-width="7" stroke-linecap="round" fill="none"/>
  <!-- paddle at contact (open face, blade forward) -->
  <line x1="53" y1="68" x2="44" y2="72" stroke="#8B4513" stroke-width="4" stroke-linecap="round"/>
  <ellipse cx="38" cy="72" rx="9" ry="7" fill="#c0392b" transform="rotate(-10 38 72)"/>
  <ellipse cx="38" cy="72" rx="7.5" ry="5.5" fill="#e74c3c" transform="rotate(-10 38 72)"/>
  <ellipse cx="38" cy="72" rx="9" ry="7" fill="none" stroke="#922b21" stroke-width="1" transform="rotate(-10 38 72)"/>
</svg>
