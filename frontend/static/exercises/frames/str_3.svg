<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 110">
  <!-- jump! – both feet off ground, arms reaching up, full extension -->
  <ellipse cx="40" cy="108" rx="14" ry="2" fill="rgba(0,0,0,.1)"/>
  <!-- right leg (in air, slightly extended) -->
  <path d="M47,63 Q52,73 54,82" stroke="#162d4a" stroke-width="11" stroke-linecap="round" fill="none"/>
  <circle cx="54" cy="81" r="5" fill="#162d4a"/>
  <path d="M54,81 Q55,90 54,98" stroke="#1a2d42" stroke-width="10" stroke-linecap="round" fill="none"/>
  <path d="M47,97 Q54,101 62,101 Q64,100 64,97 Q63,95 59,94 L53,94Z" fill="#ddd"/>
  <!-- shorts -->
  <path d="M27,62 Q40,68 53,62 L51,77 Q40,80 29,77Z" fill="#1e3a5f"/>
  <path d="M27,62 L29,79 L38,79 L39,62Z" fill="#1a3158"/>
  <path d="M41,62 L43,77 L52,77 L53,62Z" fill="#1a3158"/>
  <!-- shirt -->
  <path d="M22,28 Q40,24 58,28 L56,63 Q40,68 24,63Z" fill="#22c55e"/>
  <path d="M22,28 Q40,25 58,28 L56,42 Q40,44 24,42Z" fill="rgba(255,255,255,.08)"/>
  <!-- right arm raised up-right -->
  <path d="M57,32 Q63,19 66,9" stroke="#e0b070" stroke-width="8" stroke-linecap="round" fill="none"/>
  <circle cx="65" cy="10" r="4" fill="#d8a868"/>
  <path d="M65,10 Q66,4 67,0" stroke="#e0b070" stroke-width="7" stroke-linecap="round" fill="none"/>
  <!-- left leg (in air) -->
  <path d="M33,63 Q28,73 26,82" stroke="#1e3a5f" stroke-width="11" stroke-linecap="round" fill="none"/>
  <circle cx="26" cy="81" r="5" fill="#243352"/>
  <path d="M26,81 Q25,90 26,98" stroke="#243352" stroke-width="10" stroke-linecap="round" fill="none"/>
  <path d="M18,97 Q26,101 34,101 Q36,100 36,97 Q35,95 31,94 L25,94Z" fill="#e8e8e8"/>
  <!-- neck -->
  <rect x="36" y="24" width="8" height="6" rx="2" fill="#f5c49a"/>
  <!-- head (looking up, expression of effort) -->
  <circle cx="40" cy="13" r="11" fill="#f5c49a"/>
  <path d="M29,10 Q40,2 51,10 Q50,5 40,3 Q30,5 29,10Z" fill="#2c1b10"/>
  <ellipse cx="36" cy="12" rx="1.8" ry="2.2" fill="#1a0a00"/>
  <ellipse cx="44" cy="12" rx="1.8" ry="2.2" fill="#1a0a00"/>
  <ellipse cx="36.8" cy="11" rx=".6" ry=".8" fill="rgba(255,255,255,.65)"/>
  <ellipse cx="44.8" cy="11" rx=".6" ry=".8" fill="rgba(255,255,255,.65)"/>
  <path d="M36.5,17 Q40,20 43.5,17" stroke="#c07050" stroke-width="1.3" fill="none" stroke-linecap="round"/>
  <!-- left arm raised up-left -->
  <path d="M23,32 Q17,19 14,9" stroke="#f5c49a" stroke-width="8" stroke-linecap="round" fill="none"/>
  <circle cx="15" cy="10" r="4" fill="#f0b888"/>
  <path d="M15,10 Q14,4 13,0" stroke="#f5c49a" stroke-width="7" stroke-linecap="round" fill="none"/>
</svg>
