<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 110">
  <!-- landing / calf raise up – controlled descent, arms forward for balance -->
  <ellipse cx="40" cy="108" rx="19" ry="3" fill="rgba(0,0,0,.15)"/>
  <!-- right leg (absorbing impact, knee bent) -->
  <path d="M47,66 Q52,77 54,87" stroke="#162d4a" stroke-width="11" stroke-linecap="round" fill="none"/>
  <circle cx="54" cy="86" r="5" fill="#162d4a"/>
  <path d="M54,86 Q55,95 55,104" stroke="#1a2d42" stroke-width="10" stroke-linecap="round" fill="none"/>
  <path d="M48,104 Q55,108 63,108 Q65,107 65,104 Q64,101 60,100 L54,100Z" fill="#ddd"/>
  <!-- shorts -->
  <path d="M26,64 Q40,71 54,65 L52,80 Q40,83 28,80Z" fill="#1e3a5f"/>
  <path d="M26,64 L28,82 L37,82 L38,64Z" fill="#1a3158"/>
  <path d="M42,65 L44,80 L53,80 L54,65Z" fill="#1a3158"/>
  <!-- shirt -->
  <path d="M22,30 Q40,26 58,30 L56,65 Q40,70 24,65Z" fill="#22c55e"/>
  <path d="M22,30 Q40,27 58,30 L56,44 Q40,46 24,44Z" fill="rgba(255,255,255,.08)"/>
  <!-- right arm forward (balance) -->
  <path d="M57,34 Q62,44 63,54" stroke="#e0b070" stroke-width="8" stroke-linecap="round" fill="none"/>
  <circle cx="63" cy="53" r="4" fill="#d8a868"/>
  <path d="M63,53 Q64,62 64,70" stroke="#e0b070" stroke-width="7" stroke-linecap="round" fill="none"/>
  <circle cx="64" cy="71" r="3.5" fill="#e0b070"/>
  <!-- left leg (absorbing, knee bent) -->
  <path d="M33,66 Q28,77 26,87" stroke="#1e3a5f" stroke-width="11" stroke-linecap="round" fill="none"/>
  <circle cx="26" cy="86" r="5" fill="#243352"/>
  <path d="M26,86 Q25,95 25,104" stroke="#243352" stroke-width="10" stroke-linecap="round" fill="none"/>
  <path d="M17,104 Q25,108 33,108 Q35,107 35,104 Q34,101 30,100 L24,100Z" fill="#e8e8e8"/>
  <!-- neck -->
  <rect x="36" y="25" width="8" height="7" rx="2" fill="#f5c49a"/>
  <!-- head (slight forward lean) -->
  <circle cx="40" cy="14" r="11" fill="#f5c49a"/>
  <path d="M29,11 Q40,3 51,11 Q50,6 40,4 Q30,6 29,11Z" fill="#2c1b10"/>
  <ellipse cx="36" cy="13" rx="1.8" ry="2.2" fill="#1a0a00"/>
  <ellipse cx="44" cy="13" rx="1.8" ry="2.2" fill="#1a0a00"/>
  <ellipse cx="36.8" cy="12" rx=".6" ry=".8" fill="rgba(255,255,255,.65)"/>
  <ellipse cx="44.8" cy="12" rx=".6" ry=".8" fill="rgba(255,255,255,.65)"/>
  <path d="M37.5,18 Q40,20 42.5,18" stroke="#c07050" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- left arm forward (balance) -->
  <path d="M23,34 Q18,44 17,54" stroke="#f5c49a" stroke-width="8" stroke-linecap="round" fill="none"/>
  <circle cx="17" cy="53" r="4" fill="#f0b888"/>
  <path d="M17,53 Q16,62 16,70" stroke="#f5c49a" stroke-width="7" stroke-linecap="round" fill="none"/>
  <circle cx="16" cy="71" r="3.5" fill="#f5c49a"/>
</svg>
