<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" width="200" height="160">
  <rect width="200" height="160" rx="10" fill="#1a1c2e"/>
  <!-- rura wyrzutowa — przekrój z przodu -->
  <circle cx="100" cy="70" r="30" fill="#2a2d42" stroke="#6b6f8a" stroke-width="2"/>
  <circle cx="100" cy="70" r="24" fill="none" stroke="#4a4d62" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- górna rolka -->
  <rect x="82" y="43" width="36" height="7" rx="3" fill="#5a6377" stroke="#8b90a8" stroke-width="1"/>
  <line x1="85" y1="46.5" x2="95" y2="46.5" stroke="#9ca3af" stroke-width="0.8"/>
  <line x1="105" y1="46.5" x2="115" y2="46.5" stroke="#9ca3af" stroke-width="0.8"/>
  <!-- dolna rolka -->
  <rect x="82" y="90" width="36" height="7" rx="3" fill="#5a6377" stroke="#8b90a8" stroke-width="1"/>
  <line x1="85" y1="93.5" x2="95" y2="93.5" stroke="#9ca3af" stroke-width="0.8"/>
  <line x1="105" y1="93.5" x2="115" y2="93.5" stroke="#9ca3af" stroke-width="0.8"/>
  <!-- piłeczka -->
  <circle cx="100" cy="70" r="9" fill="#f59e0b" opacity="0.5"/>
  <!-- oś obrotu centralna -->
  <circle cx="100" cy="70" r="2" fill="#8b90a8"/>
  <!-- strzałka obrotu LEWA (czerwona) -->
  <path d="M 58 50 A 42 42 0 0 0 58 90" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="55,48 61,48 58,40" fill="#ef4444"/>
  <polygon points="55,92 61,92 58,100" fill="#ef4444"/>
  <!-- strzałka obrotu PRAWA (niebieska) -->
  <path d="M 142 50 A 42 42 0 0 1 142 90" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="139,48 145,48 142,40" fill="#3b82f6"/>
  <polygon points="139,92 145,92 142,100" fill="#3b82f6"/>
  <!-- etykiety -->
  <text x="40" y="74" fill="#ef4444" font-size="12" font-weight="700" font-family="sans-serif" text-anchor="middle">L</text>
  <text x="160" y="74" fill="#3b82f6" font-size="12" font-weight="700" font-family="sans-serif" text-anchor="middle">R</text>
  <!-- opis -->
  <text x="100" y="128" fill="#b0b5c8" font-size="10" font-family="sans-serif" text-anchor="middle" font-weight="600">ROTACJA</text>
  <text x="100" y="142" fill="#6b7280" font-size="9" font-family="sans-serif" text-anchor="middle">obrót rury wyrzutowej</text>
  <text x="100" y="153" fill="#6b7280" font-size="9" font-family="sans-serif" text-anchor="middle">zmiana typu spinu</text>
</svg>