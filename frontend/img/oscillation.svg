<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" width="200" height="160">
  <rect width="200" height="160" rx="10" fill="#1a1c2e"/>
  <!-- podstawa robota — widok z góry -->
  <rect x="70" y="110" width="60" height="25" rx="4" fill="#2a2d42" stroke="#6b6f8a" stroke-width="1.5"/>
  <!-- oś oscylacji (pionowa — widok z góry = punkt) -->
  <circle cx="100" cy="108" r="4" fill="#8b90a8" stroke="#b0b5c8" stroke-width="1"/>
  <!-- głowica — pozycja LEWA (ghost) -->
  <g opacity="0.2">
    <rect x="43" y="60" width="10" height="48" rx="2" fill="#a855f7" stroke="#a855f7" stroke-width="1" transform="rotate(-20, 48, 108)"/>
    <circle cx="48" cy="58" r="6" fill="#a855f7" opacity="0.5" transform="rotate(-20, 48, 108)"/>
  </g>
  <!-- głowica — pozycja ŚRODEK (pełna) -->
  <rect x="95" y="62" width="10" height="46" rx="2" fill="#5a6377" stroke="#8b90a8" stroke-width="1.5"/>
  <circle cx="100" cy="60" r="7" fill="#3a3d52" stroke="#8b90a8" stroke-width="1.5"/>
  <circle cx="100" cy="60" r="3" fill="#4a4d62"/>
  <!-- głowica — pozycja PRAWA (ghost) -->
  <g opacity="0.2">
    <rect x="147" y="60" width="10" height="48" rx="2" fill="#a855f7" stroke="#a855f7" stroke-width="1" transform="rotate(20, 152, 108)"/>
    <circle cx="152" cy="58" r="6" fill="#a855f7" opacity="0.5" transform="rotate(20, 152, 108)"/>
  </g>
  <!-- łuk oscylacji (fioletowy) — lewa strona -->
  <path d="M 65 48 A 50 50 0 0 0 50 72" fill="none" stroke="#a855f7" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="47,68 47,77 55,72" fill="#a855f7"/>
  <!-- łuk oscylacji (fioletowy) — prawa strona -->
  <path d="M 135 48 A 50 50 0 0 1 150 72" fill="none" stroke="#a855f7" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="153,68 153,77 145,72" fill="#a855f7"/>
  <!-- łuk łączący góra (przerywany) -->
  <path d="M 65 48 Q 100 32 135 48" fill="none" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>
  <!-- etykiety -->
  <text x="32" y="76" fill="#a855f7" font-size="12" font-weight="700" font-family="sans-serif" text-anchor="middle">L</text>
  <text x="168" y="76" fill="#a855f7" font-size="12" font-weight="700" font-family="sans-serif" text-anchor="middle">R</text>
  <!-- opis -->
  <text x="100" y="148" fill="#b0b5c8" font-size="10" font-family="sans-serif" text-anchor="middle" font-weight="600">OSCYLACJA</text>
  <text x="100" y="158" fill="#6b7280" font-size="9" font-family="sans-serif" text-anchor="middle">wahadło głowicy lewo-prawo</text>
</svg>