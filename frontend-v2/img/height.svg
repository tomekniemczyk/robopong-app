<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" width="200" height="160">
  <rect width="200" height="160" rx="10" fill="#1a1c2e"/>
  <!-- korpus robota — widok z boku -->
  <rect x="20" y="90" width="50" height="55" rx="4" fill="#2a2d42" stroke="#6b6f8a" stroke-width="1.5"/>
  <!-- kanał piłek (przezroczysty) -->
  <rect x="38" y="50" width="14" height="42" rx="2" fill="none" stroke="#4a4d62" stroke-width="1" stroke-dasharray="2,2"/>
  <circle cx="45" cy="62" r="4" fill="#f59e0b" opacity="0.3"/>
  <circle cx="45" cy="74" r="4" fill="#f59e0b" opacity="0.3"/>
  <!-- oś pochylenia -->
  <circle cx="55" cy="50" r="4" fill="#8b90a8" stroke="#b0b5c8" stroke-width="1"/>
  <!-- głowica — pozycja wysoko (ghost) -->
  <g opacity="0.25">
    <rect x="53" y="12" width="8" height="36" rx="2" fill="#22c55e" stroke="#22c55e" stroke-width="1" transform="rotate(-30, 55, 50)"/>
  </g>
  <!-- głowica — pozycja środek -->
  <rect x="53" y="14" width="8" height="36" rx="2" fill="#5a6377" stroke="#8b90a8" stroke-width="1.5" transform="rotate(-10, 55, 50)"/>
  <!-- głowica — pozycja nisko (ghost) -->
  <g opacity="0.25">
    <rect x="53" y="14" width="8" height="36" rx="2" fill="#f97316" stroke="#f97316" stroke-width="1" transform="rotate(15, 55, 50)"/>
  </g>
  <!-- strzałka w górę (zielona) -->
  <path d="M 38 28 A 28 28 0 0 0 28 45" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="36,24 41,30 33,30" fill="#22c55e"/>
  <!-- strzałka w dół (pomarańczowa) -->
  <path d="M 72 38 A 28 28 0 0 1 78 58" fill="none" stroke="#f97316" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="80,61 82,52 75,55" fill="#f97316"/>
  <!-- trajektoria piłki — wysoko -->
  <circle cx="145" cy="18" r="5" fill="#22c55e" opacity="0.5"/>
  <path d="M 70 25 Q 110 0 145 18" fill="none" stroke="#22c55e" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.5"/>
  <!-- trajektoria piłki — nisko -->
  <circle cx="160" cy="72" r="5" fill="#f97316" opacity="0.4"/>
  <path d="M 75 50 Q 120 48 160 72" fill="none" stroke="#f97316" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.4"/>
  <!-- etykiety -->
  <text x="16" y="32" fill="#22c55e" font-size="10" font-weight="700" font-family="sans-serif">UP</text>
  <text x="82" y="68" fill="#f97316" font-size="10" font-weight="700" font-family="sans-serif">DN</text>
  <!-- opis -->
  <text x="130" y="110" fill="#b0b5c8" font-size="10" font-family="sans-serif" text-anchor="middle" font-weight="600">WYSOKOŚĆ</text>
  <text x="130" y="124" fill="#6b7280" font-size="9" font-family="sans-serif" text-anchor="middle">pochylenie głowicy</text>
  <text x="130" y="136" fill="#6b7280" font-size="9" font-family="sans-serif" text-anchor="middle">kąt wylotu piłki</text>
</svg>